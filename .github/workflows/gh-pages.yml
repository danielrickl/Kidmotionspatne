name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Keep credentials so subsequent steps (or actions) can push.
          persist-credentials: true
          # Fetch full history so gh-pages action can create proper commits.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (prefer exact lockfile)
        # If package-lock.json is present, `npm ci` will install exact versions.
        # If it is not present (e.g. first deploy), fall back to `npm install` to generate a lockfile on the runner.
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Configure git identity for Actions
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./dist
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
